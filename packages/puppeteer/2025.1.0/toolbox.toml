[tool]
name = "puppeteer"
version = "2025.1.0"
description = "Control a headless Chrome browser for web scraping, screenshots, form filling, and automated testing."
author = "Anthropic"
homepage = "https://github.com/modelcontextprotocol/servers/tree/main/src/puppeteer"
license = "MIT"

[runtime]
runner = "bun"
package = "@modelcontextprotocol/server-puppeteer"
args = []
transport = "stdio"

[permissions]
filesystem = ["write:/tmp/screenshots"]
network = true
allow_exec = true
env_vars = ["HOME", "PATH", "TMPDIR", "DISPLAY"]
max_memory_mb = 256
max_cpu_percent = 50

[[mcp.tools]]
name = "puppeteer_navigate"
description = "Navigate the browser to a specified URL"

[[mcp.tools]]
name = "puppeteer_screenshot"
description = "Take a screenshot of the current page or a specific element"

[[mcp.tools]]
name = "puppeteer_click"
description = "Click on an element identified by a CSS selector"

[[mcp.tools]]
name = "puppeteer_fill"
description = "Fill in a form field with the specified value"

[[mcp.tools]]
name = "puppeteer_select"
description = "Select an option from a dropdown element"

[[mcp.tools]]
name = "puppeteer_hover"
description = "Hover the mouse over an element identified by a CSS selector"

[[mcp.tools]]
name = "puppeteer_evaluate"
description = "Execute JavaScript code in the browser context and return the result"
