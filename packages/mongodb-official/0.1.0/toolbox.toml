[tool]
name = "mongodb-official"
version = "0.1.0"
description = "MongoDB database and Atlas cloud management MCP server"
author = "mongodb"
homepage = "https://github.com/mongodb-js/mongodb-mcp-server"
license = "Apache-2.0"

[binary]
entry = "mongodb-mcp-server"
platforms = ["macos-aarch64", "macos-x86_64", "linux-x86_64", "windows-x86_64"]

[runtime]
transport = "stdio"

[permissions]
filesystem = false
network = true
max_memory_mb = 512
max_cpu_percent = 80

[[mcp.tools]]
name = "connect"
description = "Connect to a MongoDB instance"

[[mcp.tools]]
name = "switch-connection"
description = "Switch to a different MongoDB connection"

[[mcp.tools]]
name = "list-databases"
description = "List all databases on the connected instance"

[[mcp.tools]]
name = "list-collections"
description = "List collections in a database"

[[mcp.tools]]
name = "collection-schema"
description = "Get the schema of a collection"

[[mcp.tools]]
name = "collection-indexes"
description = "List indexes on a collection"

[[mcp.tools]]
name = "collection-storage-size"
description = "Get the storage size of a collection"

[[mcp.tools]]
name = "db-stats"
description = "Get database statistics"

[[mcp.tools]]
name = "find"
description = "Query documents in a collection"

[[mcp.tools]]
name = "aggregate"
description = "Run an aggregation pipeline on a collection"

[[mcp.tools]]
name = "count"
description = "Count documents matching a filter"

[[mcp.tools]]
name = "explain"
description = "Explain a query execution plan"

[[mcp.tools]]
name = "insert-many"
description = "Insert multiple documents into a collection"

[[mcp.tools]]
name = "update-many"
description = "Update multiple documents matching a filter"

[[mcp.tools]]
name = "delete-many"
description = "Delete multiple documents matching a filter"

[[mcp.tools]]
name = "create-collection"
description = "Create a new collection"

[[mcp.tools]]
name = "drop-collection"
description = "Drop an existing collection"

[[mcp.tools]]
name = "rename-collection"
description = "Rename a collection"

[[mcp.tools]]
name = "drop-database"
description = "Drop an existing database"

[[mcp.tools]]
name = "create-index"
description = "Create an index on a collection"

[[mcp.tools]]
name = "drop-index"
description = "Drop an index from a collection"

[[mcp.tools]]
name = "export"
description = "Export data from a collection"

[[mcp.tools]]
name = "mongodb-logs"
description = "View MongoDB server logs"

[[mcp.tools]]
name = "atlas-connect-cluster"
description = "Connect to a MongoDB Atlas cluster"

[[mcp.tools]]
name = "atlas-list-clusters"
description = "List Atlas clusters in a project"

[[mcp.tools]]
name = "atlas-inspect-cluster"
description = "Get details about a specific Atlas cluster"

[[mcp.tools]]
name = "atlas-create-free-cluster"
description = "Create a free-tier Atlas cluster"

[[mcp.tools]]
name = "atlas-list-orgs"
description = "List Atlas organizations"

[[mcp.tools]]
name = "atlas-list-projects"
description = "List Atlas projects"

[[mcp.tools]]
name = "atlas-create-project"
description = "Create a new Atlas project"

[[mcp.tools]]
name = "atlas-list-db-users"
description = "List database users in an Atlas project"

[[mcp.tools]]
name = "atlas-create-db-user"
description = "Create a database user in Atlas"

[[mcp.tools]]
name = "atlas-inspect-access-list"
description = "Inspect the IP access list for an Atlas project"

[[mcp.tools]]
name = "atlas-create-access-list"
description = "Add entries to the Atlas IP access list"

[[mcp.tools]]
name = "atlas-list-alerts"
description = "List alerts for an Atlas project"

[[mcp.tools]]
name = "atlas-get-performance-advisor"
description = "Get performance advisor recommendations"

[[mcp.tools]]
name = "atlas-local-list-deployments"
description = "List local Atlas deployments"

[[mcp.tools]]
name = "atlas-local-create-deployment"
description = "Create a local Atlas deployment"

[[mcp.tools]]
name = "atlas-local-delete-deployment"
description = "Delete a local Atlas deployment"

[[mcp.tools]]
name = "atlas-local-connect-deployment"
description = "Connect to a local Atlas deployment"

[[mcp.tools]]
name = "list-knowledge-sources"
description = "List available MongoDB knowledge sources"

[[mcp.tools]]
name = "search-knowledge"
description = "Search MongoDB documentation and knowledge base"
